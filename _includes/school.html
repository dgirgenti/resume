<section class="school">
    <h3><a href="{{ school.url }}" target="_blank">{{ school.name }}</a></h3>
    <h4><a href="{{ school.collegeurl }}" target="_blank">{{ school.collegename }}</a></h4>

    <dl>
        <dt>major</dt> <dd>{{ school.program }}</dd>
        <dt>when</dt> <dd><time datetime="">{{ school.start }}</time> &ndash; <time datetime="">{{ school.end }}</time></dd>
    </dl>
    <dl>
        <dt>minors</dt> <dd>{{ school.minors }}</dd>
    </dl>
</section>
